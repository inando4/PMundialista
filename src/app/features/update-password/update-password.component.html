<section class="auth-layout">
  <form class="panel auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <div>
      <p class="eyebrow">Cuenta</p>
      <h1>Nueva contrasena</h1>
    </div>

    <label>
      Nueva contrasena
      <input type="password" formControlName="password" placeholder="Minimo 6 caracteres" />
    </label>

    <label>
      Confirmar contrasena
      <input type="password" formControlName="confirmPassword" placeholder="Repite la contrasena" />
    </label>

    @if (message()) {
      <p class="alert">{{ message() }}</p>
    }

    <button type="submit" class="primary-button" [disabled]="form.invalid || loading() || !canUpdate()">
      {{ loading() ? 'Guardando...' : 'Guardar contrasena' }}
    </button>

    <a class="link-button" routerLink="/login">Volver al login</a>
  </form>
</section>
